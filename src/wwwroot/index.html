<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>🐙 AzimuthConsole Monitor</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			height: 100vh;
			overflow: hidden;
			background: #2d2d2d;
		}

		#container {
			display: flex;
			height: 100vh;
			position: relative;
		}

		/* Карта */
		#map-container {
			flex: 1 1 auto;
			position: relative;
			background: #1e3d5e;
			overflow: hidden;
			transition: none;
		}

		#map-canvas {
			width: 100%;
			height: 100%;
			display: block;
			cursor: grab;
		}

			#map-canvas:active {
				cursor: grabbing;
			}

		/* Разделитель для изменения размера панелей */
		.resizer {
			flex: 0 0 auto;
			width: 5px;
			background: #4a90e2;
			cursor: col-resize;
			user-select: none;
			transition: background 0.2s;
		}

			.resizer:hover,
			.resizer:active {
				background: #ff4444;
			}

		/* Боковая панель */
		#sidebar {
			flex: 0 0 auto;
			width: 400px;
			background: #f5f5f5;
			display: flex;
			flex-direction: column;
			border-left: 2px solid #4a90e2;
			transition: none;
		}

		/* Панель управления на карте */
		#controls {
			position: absolute;
			top: 20px;
			right: 20px;
			z-index: 1000;
			display: flex;
			gap: 10px;
			background: rgba(0, 0, 0, 0.7);
			padding: 10px;
			border-radius: 8px;
			backdrop-filter: blur(5px);
		}

		.control-btn {
			width: 40px;
			height: 40px;
			border: none;
			border-radius: 6px;
			background: #4a90e2;
			color: white;
			font-size: 20px;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			justify-content: center;
		}

			.control-btn:hover {
				background: #357abd;
				transform: scale(1.05);
			}

			.control-btn:active {
				transform: scale(0.95);
			}

		#reset-view {
			width: auto;
			padding: 0 15px;
			font-size: 14px;
		}

		#auto-scale-btn {
			background: #28a745;
		}

			#auto-scale-btn.off {
				background: #4a90e2;
			}		

		/* Статус соединения */
		#connection-status {
			position: absolute;
			top: 20px;
			left: 20px;
			z-index: 1000;
			padding: 6px 12px;
			border-radius: 20px;
			font-size: 12px;
			font-weight: bold;
			background: rgba(0,0,0,0.7);
			color: white;
			border-left: 3px solid #dc3545;
		}

			#connection-status.connected {
				border-left-color: #28a745;
			}

		/* Системная информация */
		#system-info {
			position: absolute;
			top: 70px;
			left: 20px;
			background: rgba(0,0,0,0.7);
			color: white;
			padding: 12px;
			border-radius: 8px;
			font-size: 12px;
			z-index: 1000;
			backdrop-filter: blur(5px);
			border: 1px solid #4a90e2;
			min-width: 220px;
			line-height: 1.5;
		}

		/* Панель маяков */
		#beacons-panel {
			flex: 2;
			padding: 15px;
			overflow-y: auto;
			background: white;
			border-bottom: 2px solid #4a90e2;
		}

			#beacons-panel h3 {
				color: #333;
				margin-bottom: 15px;
				padding-bottom: 8px;
				border-bottom: 2px solid #4a90e2;
			}

		.beacon-item {
			background: #f8f9fa;
			border: 1px solid #dee2e6;
			border-radius: 6px;
			padding: 10px;
			margin-bottom: 10px;
			transition: all 0.2s;
		}

			.beacon-item:hover {
				box-shadow: 0 2px 8px rgba(0,0,0,0.1);
				transform: translateX(2px);
			}

			.beacon-item.warning {
				background: #fff3cd;
				border-color: #ffc107;
			}

			.beacon-item.timeout {
				background: #f8d7da;
				border-color: #dc3545;
			}

		.beacon-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 8px;
		}

		.beacon-address {
			font-weight: bold;
			color: #4a90e2;
			background: #e3f2fd;
			padding: 3px 8px;
			border-radius: 12px;
			font-size: 12px;
		}

		.beacon-status {
			font-size: 11px;
			padding: 2px 6px;
			border-radius: 10px;
		}

		.status-active {
			background: #d4edda;
			color: #155724;
		}

		.status-warning {
			background: #fff3cd;
			color: #856404;
		}

		.status-timeout {
			background: #f8d7da;
			color: #721c24;
		}

		.beacon-details {
			font-size: 12px;
			color: #666;
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 5px;
		}

		.beacon-detail {
			display: flex;
			justify-content: space-between;
		}

		.detail-label {
			color: #999;
		}

		.detail-value {
			font-weight: 500;
			color: #333;
		}

		/* Панель логов */
		#logs-panel {
			flex: 1;
			padding: 15px;
			overflow-y: auto;
			background: #2d2d2d;
			color: #fff;
			font-family: 'Consolas', monospace;
			font-size: 11px;
		}

			#logs-panel h4 {
				color: #4a90e2;
				margin-bottom: 10px;
			}

		#logs-list {
			height: calc(100% - 30px);
			overflow-y: auto;
			display: flex;
			flex-direction: column;
		}

		.log-entry {
			padding: 4px 8px;
			margin: 2px 0;
			border-radius: 3px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			flex-shrink: 0;
		}

		.log-info {
			background: #3a3a3a;
			color: #d4d4d4;
		}

		.log-warning {
			background: #665500;
			color: #ffd700;
		}

		.log-error {
			background: #662222;
			color: #ff6b6b;
		}
	</style>
</head>
<body>
	<div id="container">
		<div id="map-container">
			<canvas id="map-canvas"></canvas>

			<div id="controls">
				<button class="control-btn" id="zoom-in">+</button>
				<button class="control-btn" id="zoom-out">−</button>
				<button class="control-btn" id="reset-view">Reset</button>
				<button class="control-btn" id="auto-scale-btn">A</button>
			</div>			
			<div id="connection-status">● DISCONNECTED</div>
			<div id="system-info">
				<div>Loading...</div>
			</div>
		</div>

		<div id="sidebar-resizer" class="resizer"></div>

		<div id="sidebar">
			<div id="beacons-panel">
				<h3>📡 Beacons</h3>
				<div id="beacons-list">No beacons detected</div>
			</div>
			<div id="logs-panel">
				<h4>📋 Log</h4>
				<div id="logs-list"></div>
			</div>
		</div>
	</div>

	<script src="i18n.js"></script>
	<script src="script.js"></script>
</body>
</html>
